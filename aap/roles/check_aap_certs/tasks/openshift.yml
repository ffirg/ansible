---
# roles/check_aap_certs/tasks/openshift.yml
#
# Certificate checking for OpenShift AAP (Operator-deployed)
#
# Note: OpenShift AAP typically uses cert-manager for certificate management.
# Certificates are stored in Kubernetes Secrets rather than files.

- name: Verify oc connectivity
  ansible.builtin.command: oc whoami
  register: oc_whoami
  changed_when: false
  failed_when: false

- name: Fail if not logged into OpenShift
  ansible.builtin.fail:
    msg: |
      Not logged into OpenShift. Please run:
        oc login <cluster-url>
      Or specify kubeconfig:
        -e "kubeconfig=/path/to/kubeconfig"
  when: oc_whoami.rc != 0

- name: Display OpenShift user
  ansible.builtin.debug:
    msg: "Connected to OpenShift as: {{ oc_whoami.stdout }}"

# Discover AAP pods in the namespace
- name: Discover AAP pods
  ansible.builtin.shell: |
    oc get pods -n {{ aap_namespace }} --no-headers -o custom-columns=NAME:.metadata.name 2>/dev/null | \
      grep -E '^(automation-|aap-)' | sort -u
  register: aap_pods
  changed_when: false
  failed_when: false

- name: Fail if no AAP pods found
  ansible.builtin.fail:
    msg: |
      No AAP pods found in namespace '{{ aap_namespace }}'.

      Check:
        1. Correct namespace: oc get pods -n {{ aap_namespace }}
        2. AAP is deployed: oc get automationcontroller,automationhub -n {{ aap_namespace }}

      Specify different namespace:
        -e "aap_namespace=your-aap-namespace"
  when: aap_pods.stdout_lines | length == 0

- name: Display discovered pods
  ansible.builtin.debug:
    msg: "Discovered {{ aap_pods.stdout_lines | length }} AAP pods in namespace {{ aap_namespace }}"

# Discover TLS secrets
- name: Discover TLS secrets
  ansible.builtin.shell: |
    oc get secrets -n {{ aap_namespace }} --no-headers -o custom-columns=NAME:.metadata.name,TYPE:.type 2>/dev/null | \
      grep -E 'tls|cert' | awk '{print $1}'
  register: tls_secrets
  changed_when: false
  failed_when: false

- name: Display discovered secrets
  ansible.builtin.debug:
    msg: "Found {{ tls_secrets.stdout_lines | length }} TLS-related secrets"

# Build list of certificates to check from secrets
- name: Initialize certificate list
  ansible.builtin.set_fact:
    certificates_to_check: []

- name: Map secrets to certificate entries
  ansible.builtin.set_fact:
    certificates_to_check: >-
      {{
        certificates_to_check + [{
          'name': item | regex_replace('-tls$', '') | regex_replace('-cert$', '') | regex_replace('-', ' ') | title,
          'secret': item,
          'namespace': aap_namespace,
          'type': 'tls-secret'
        }]
      }}
  loop: "{{ tls_secrets.stdout_lines }}"
  when: item != ''

- name: Display certificates to check
  ansible.builtin.debug:
    msg: "Will check {{ certificates_to_check | length }} certificates from secrets"

# Extract and check each certificate from secrets
- name: Extract certificate from secret
  ansible.builtin.shell: |
    oc get secret {{ item.secret }} -n {{ item.namespace }} -o jsonpath='{.data.tls\.crt}' 2>/dev/null | \
      base64 -d | openssl x509 -noout -enddate -issuer -subject 2>/dev/null
  loop: "{{ certificates_to_check }}"
  loop_control:
    label: "{{ item.name }}"
  register: cert_info
  changed_when: false
  failed_when: false

- name: Calculate days remaining for each certificate
  ansible.builtin.shell: |
    cert_data=$(oc get secret {{ item.item.secret }} -n {{ item.item.namespace }} -o jsonpath='{.data.tls\.crt}' 2>/dev/null | base64 -d)
    if [ -z "$cert_data" ]; then
      echo "NO_CERT"
      exit 0
    fi
    expiry_date=$(echo "$cert_data" | openssl x509 -noout -enddate 2>/dev/null | sed 's/notAfter=//')
    if [ -z "$expiry_date" ]; then
      echo "PARSE_ERROR"
      exit 0
    fi
    expiry_epoch=$(date -d "$expiry_date" +%s 2>/dev/null || date -jf "%b %d %T %Y %Z" "$expiry_date" +%s 2>/dev/null)
    now_epoch=$(date +%s)
    echo $(( (expiry_epoch - now_epoch) / 86400 ))
  loop: "{{ cert_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: days_remaining
  changed_when: false
  failed_when: false

- name: Get certificate expiry date
  ansible.builtin.shell: |
    oc get secret {{ item.item.secret }} -n {{ item.item.namespace }} -o jsonpath='{.data.tls\.crt}' 2>/dev/null | \
      base64 -d | openssl x509 -noout -enddate 2>/dev/null | sed 's/notAfter=//'
  loop: "{{ cert_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: cert_expiry
  changed_when: false
  failed_when: false

- name: Get certificate issuer
  ansible.builtin.shell: |
    oc get secret {{ item.item.secret }} -n {{ item.item.namespace }} -o jsonpath='{.data.tls\.crt}' 2>/dev/null | \
      base64 -d | openssl x509 -noout -issuer 2>/dev/null | sed 's/issuer=//'
  loop: "{{ cert_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: cert_issuer
  changed_when: false
  failed_when: false

- name: Get signature algorithm
  ansible.builtin.shell: |
    oc get secret {{ item.item.secret }} -n {{ item.item.namespace }} -o jsonpath='{.data.tls\.crt}' 2>/dev/null | \
      base64 -d | openssl x509 -noout -text 2>/dev/null | grep -m1 "Signature Algorithm:" | sed 's/.*Signature Algorithm: //'
  loop: "{{ cert_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: cert_sig_alg
  changed_when: false
  failed_when: false

- name: Get public key algorithm and size
  ansible.builtin.shell: |
    cert_data=$(oc get secret {{ item.item.secret }} -n {{ item.item.namespace }} -o jsonpath='{.data.tls\.crt}' 2>/dev/null | base64 -d)
    key_info=$(echo "$cert_data" | openssl x509 -noout -text 2>/dev/null)
    key_alg=$(echo "$key_info" | grep "Public Key Algorithm:" | sed 's/.*Public Key Algorithm: //')
    key_size=$(echo "$key_info" | grep "Public-Key:" | sed 's/.*(\([0-9]*\) bit).*/\1/')
    if [ -z "$key_size" ]; then
      key_size=$(echo "$key_info" | grep "ASN1 OID:" | sed 's/.*ASN1 OID: //')
    fi
    echo "${key_alg}:${key_size}"
  loop: "{{ cert_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: cert_key_info
  changed_when: false
  failed_when: false

- name: Get Subject Alternative Names
  ansible.builtin.shell: |
    oc get secret {{ item.item.secret }} -n {{ item.item.namespace }} -o jsonpath='{.data.tls\.crt}' 2>/dev/null | \
      base64 -d | openssl x509 -noout -ext subjectAltName 2>/dev/null | grep -v "Subject Alternative Name:" | tr ',' '\n' | sed 's/^ *//' | head -5 | tr '\n' ',' | sed 's/,$//'
  loop: "{{ cert_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: cert_san
  changed_when: false
  failed_when: false

# Build report data
- name: Build certificate report
  ansible.builtin.set_fact:
    cert_report: >-
      {{
        cert_report | default([]) + [{
          'name': item.0.item.name,
          'path': 'secret/' + item.0.item.secret,
          'type': 'tls-secret',
          'namespace': item.0.item.namespace,
          'exists': item.1.stdout not in ['NO_CERT', 'PARSE_ERROR', ''],
          'days_remaining': (item.1.stdout | int) if item.1.stdout not in ['NO_CERT', 'PARSE_ERROR', ''] else none,
          'expiry_date': item.2.stdout | default('N/A'),
          'issuer': item.3.stdout | default('N/A'),
          'sig_algorithm': item.4.stdout | default('N/A'),
          'key_algorithm': (item.5.stdout | default('N/A')).split(':')[0],
          'key_size': (item.5.stdout | default('N/A')).split(':')[1] | default('N/A'),
          'san': item.6.stdout | default(''),
          'source': 'cert-manager' if 'cert-manager' in (item.3.stdout | default('')) else 'External',
          'status':
            'missing' if item.1.stdout in ['NO_CERT', ''] else
            'error' if item.1.stdout == 'PARSE_ERROR' else
            'expired' if (item.1.stdout | int) < 0 else
            'warning' if (item.1.stdout | int) <= warn_days else
            'ok',
          'platform': 'openshift'
        }]
      }}
  loop: "{{ cert_info.results | zip(days_remaining.results, cert_expiry.results, cert_issuer.results, cert_sig_alg.results, cert_key_info.results, cert_san.results) | list }}"
  loop_control:
    label: "{{ item.0.item.name }}"

# Check for cert-manager Certificate resources
- name: Check for cert-manager Certificate resources
  ansible.builtin.shell: |
    oc get certificates.cert-manager.io -n {{ aap_namespace }} --no-headers 2>/dev/null | wc -l
  register: certmanager_certs
  changed_when: false
  failed_when: false

- name: Display cert-manager info
  ansible.builtin.debug:
    msg: |
      cert-manager Certificate resources found: {{ certmanager_certs.stdout | int }}
      Note: If using cert-manager, certificates are auto-renewed. Check Certificate resources for renewal status:
        oc get certificates.cert-manager.io -n {{ aap_namespace }}
  when: certmanager_certs.stdout | int > 0
