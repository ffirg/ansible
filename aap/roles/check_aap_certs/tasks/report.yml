---
# roles/check_aap_certs/tasks/report.yml
#
# Common report generation for all platforms

- name: Sort report by days remaining
  ansible.builtin.set_fact:
    cert_report_sorted: >-
      {{
        (cert_report | selectattr('status', 'in', ['missing', 'error', 'expired', 'warning']) | list) +
        (cert_report | selectattr('status', 'eq', 'ok') | sort(attribute='days_remaining') | list)
      }}

- name: Calculate summary statistics
  ansible.builtin.set_fact:
    cert_summary:
      total: "{{ cert_report | length }}"
      ok: "{{ cert_report | selectattr('status', 'eq', 'ok') | list | length }}"
      warning: "{{ cert_report | selectattr('status', 'eq', 'warning') | list | length }}"
      critical: "{{ cert_report | selectattr('status', 'eq', 'critical') | list | length }}"
      expired: "{{ cert_report | selectattr('status', 'eq', 'expired') | list | length }}"
      missing: "{{ cert_report | selectattr('status', 'eq', 'missing') | list | length }}"
      error: "{{ cert_report | selectattr('status', 'eq', 'error') | list | length }}"
      platform: "{{ cert_report[0].platform | default('unknown') }}"

- name: Set cert_expired flag
  ansible.builtin.set_fact:
    cert_expired: "{{ (cert_summary.expired | int) > 0 }}"

- name: Identify certs exceeding recommended lifetime
  ansible.builtin.set_fact:
    certs_over_lifetime: >-
      {{ cert_report | selectattr('days_remaining', 'defined') | selectattr('days_remaining', 'gt', (cert_lifetime_days | int)) | list }}

# Display report header
- name: Display report header
  ansible.builtin.debug:
    msg: "═══════════════════════════════════════════════════════════════════════════════════════"

- name: Display report title
  ansible.builtin.debug:
    msg: "AAP Certificate Expiry Report"

- name: Display report separator
  ansible.builtin.debug:
    msg: "═══════════════════════════════════════════════════════════════════════════════════════"

- name: Display host info
  ansible.builtin.debug:
    msg: "Host: {{ inventory_hostname }}"

- name: Display platform info
  ansible.builtin.debug:
    msg: "Platform: {{ cert_summary.platform }}"

- name: Display check date
  ansible.builtin.debug:
    msg: "Check Date: {{ ansible_date_time.iso8601 }}"

- name: Display thresholds
  ansible.builtin.debug:
    msg: "Thresholds: Warning={{ cert_warning_days }} days | Critical={{ cert_critical_days }} days | Max Lifetime={{ cert_lifetime_days }} days"

- name: Display header separator
  ansible.builtin.debug:
    msg: "───────────────────────────────────────────────────────────────────────────────────────"

# Display table header
- name: Display table header
  ansible.builtin.debug:
    msg: "{{ '%-22s' | format('CERTIFICATE') }} {{ '%-10s' | format('STATUS') }} {{ '%-10s' | format('SOURCE') }} {{ '%-12s' | format('EXPIRES') }} {{ '%6s' | format('DAYS') }}  {{ '%-12s' | format('KEY') }} {{ '%-20s' | format('SIGNATURE') }}{{ '  ' + '%-40s' | format('PATH') if cert_show_paths | bool else '' }}"

# Display each certificate
- name: Display certificate status
  ansible.builtin.debug:
    msg: "{{ '%-22s' | format(item.name[:22]) }} {{ '%-10s' | format('[' + item.status | upper + ']') }} {{ '%-10s' | format(item.source[:10]) }} {{ '%-12s' | format((item.expiry_date[:12]) if item.expiry_date != 'N/A' else 'N/A') }} {{ '%6s' | format(item.days_remaining | default('N/A') | string) }}  {{ '%-12s' | format((item.key_algorithm | default('') + ' ' + item.key_size | default(''))[:12]) }} {{ item.sig_algorithm | default('N/A') }}{{ '  ' + item.path if cert_show_paths | bool else '' }}"
  loop: "{{ cert_report_sorted }}"
  loop_control:
    label: "{{ item.name }}"

# Display summary
- name: Display summary separator
  ansible.builtin.debug:
    msg: "───────────────────────────────────────────────────────────────────────────────────────"

- name: Display summary
  ansible.builtin.debug:
    msg: "SUMMARY: Total={{ cert_summary.total }} | OK={{ cert_summary.ok }} | Warning={{ cert_summary.warning }} | Critical={{ cert_summary.critical }} | Expired={{ cert_summary.expired }} | Missing={{ cert_summary.missing }}{{ ' | Errors=' + cert_summary.error | string if cert_summary.error | int > 0 else '' }}"

- name: Display final separator
  ansible.builtin.debug:
    msg: "───────────────────────────────────────────────────────────────────────────────────────"

# Alerts
- name: Display EXPIRED alert
  ansible.builtin.debug:
    msg: "*** EXPIRED: {{ cert_summary.expired }} certificate(s) have EXPIRED! Immediate action required! ***"
  when: cert_summary.expired | int > 0

- name: Display CRITICAL alert
  ansible.builtin.debug:
    msg: "*** CRITICAL: {{ cert_summary.critical }} certificate(s) expire within {{ cert_critical_days }} days - Urgent action required ***"
  when: cert_summary.critical | int > 0

- name: Display WARNING alert
  ansible.builtin.debug:
    msg: "*** WARNING: {{ cert_summary.warning }} certificate(s) expire within {{ cert_warning_days }} days - Schedule renewal ***"
  when: cert_summary.warning | int > 0

- name: Display LIFETIME alert
  ansible.builtin.debug:
    msg: "*** POLICY: {{ certs_over_lifetime | length }} certificate(s) exceed recommended {{ cert_lifetime_days }}-day lifetime ***"
  when: certs_over_lifetime | length > 0

- name: Display OK status
  ansible.builtin.debug:
    msg: "*** All certificates OK ***"
  when: cert_summary.expired | int == 0 and cert_summary.critical | int == 0 and cert_summary.warning | int == 0 and cert_summary.missing | int == 0

# Generate markdown report file if requested
- name: Generate markdown report
  ansible.builtin.copy:
    content: |
      # AAP Certificate Expiry Report

      **Host:** {{ inventory_hostname }}
      **Platform:** {{ cert_summary.platform }}
      **Check Date:** {{ ansible_date_time.iso8601 }}
      **Warning Threshold:** {{ warn_days }} days

      ## Summary

      | Status | Count |
      |--------|-------|
      | OK | {{ cert_summary.ok }} |
      | Warning | {{ cert_summary.warning }} |
      | Expired | {{ cert_summary.expired }} |
      | Missing | {{ cert_summary.missing }} |
      {% if cert_summary.error | int > 0 %}| Errors | {{ cert_summary.error }} |
      {% endif %}| **Total** | **{{ cert_summary.total }}** |

      {% if cert_summary.expired | int > 0 %}
      > **CRITICAL:** {{ cert_summary.expired }} certificate(s) have **EXPIRED**!
      {% endif %}
      {% if cert_summary.warning | int > 0 %}
      > **WARNING:** {{ cert_summary.warning }} certificate(s) expire within {{ warn_days }} days
      {% endif %}

      ## Certificate Details

      | Certificate | Status | Source | Expires | Days Left | Key Type | Key Size | Signature |{% if cert_show_paths | bool %} Path |{% endif %}

      |-------------|--------|--------|---------|-----------|----------|----------|-----------|{% if cert_show_paths | bool %}------|{% endif %}

      {% for cert in cert_report_sorted %}
      | {{ cert.name }} | {% if cert.status == 'expired' %}**EXPIRED**{% elif cert.status == 'warning' %}**WARNING**{% elif cert.status == 'missing' %}MISSING{% elif cert.status == 'error' %}ERROR{% else %}OK{% endif %} | {{ cert.source }} | {{ cert.expiry_date }} | {{ cert.days_remaining | default('N/A') }} | {{ cert.key_algorithm | default('N/A') }} | {{ cert.key_size | default('N/A') }} | {{ cert.sig_algorithm | default('N/A') }} |{% if cert_show_paths | bool %} `{{ cert.path }}` |{% endif %}

      {% endfor %}

      ## Certificates Requiring Attention

      {% if cert_report | selectattr('status', 'in', ['expired', 'warning']) | list | length > 0 %}
      {% for cert in cert_report_sorted if cert.status in ['expired', 'warning'] %}
      ### {{ cert.name }} ({{ cert.status | upper }})

      {% if cert_show_paths | bool %}- **Path:** `{{ cert.path }}`
      {% endif %}- **Source:** {{ cert.source }}
      - **Expires:** {{ cert.expiry_date }}
      - **Days Remaining:** {{ cert.days_remaining }}
      - **Key Type:** {{ cert.key_algorithm | default('N/A') }}
      - **Key Size:** {{ cert.key_size | default('N/A') }}
      - **Signature Algorithm:** {{ cert.sig_algorithm | default('N/A') }}
      {% if cert.san | default('') | length > 0 %}- **Subject Alt Names:** {{ cert.san }}
      {% endif %}- **Platform:** {{ cert.platform }}
      {% if cert.platform == 'containerized' %}
      - **Action Required:** {% if cert.source == 'Installer' %}Regenerate using AAP installer or rotate-installer-certs.yml{% elif cert.source == 'Custom CA' %}Regenerate using your CA{% elif cert.source == 'External' %}Obtain new certificate from external CA/ACME provider{% else %}Check certificate configuration{% endif %}
      {% else %}
      - **Action Required:** {% if cert.source == 'cert-manager' %}Check cert-manager Certificate resource for renewal status{% else %}Update Kubernetes Secret with new certificate{% endif %}
      {% endif %}

      {% endfor %}
      {% else %}
      No certificates require immediate attention.
      {% endif %}

      ## Cryptographic Summary

      | Algorithm | Count | Notes |
      |-----------|-------|-------|
      {% set rsa_certs = cert_report | selectattr('key_algorithm', 'defined') | selectattr('key_algorithm', 'search', 'rsa') | list %}
      {% set ec_certs = cert_report | selectattr('key_algorithm', 'defined') | selectattr('key_algorithm', 'search', 'id-ecPublicKey') | list %}
      {% set sha256_certs = cert_report | selectattr('sig_algorithm', 'defined') | selectattr('sig_algorithm', 'search', 'sha256') | list %}
      {% set sha384_certs = cert_report | selectattr('sig_algorithm', 'defined') | selectattr('sig_algorithm', 'search', 'sha384') | list %}
      {% set sha1_certs = cert_report | selectattr('sig_algorithm', 'defined') | selectattr('sig_algorithm', 'search', 'sha1') | list %}
      {% set weak_rsa = cert_report | selectattr('key_algorithm', 'defined') | selectattr('key_algorithm', 'search', 'rsa') | selectattr('key_size', 'defined') | selectattr('key_size', 'lt', '3072') | list %}
      | RSA Keys | {{ rsa_certs | length }} | {% if rsa_certs | selectattr('key_size', 'lt', '2048') | list | length > 0 %}**Warning: Some keys < 2048 bits**{% else %}All keys >= 2048 bits{% endif %} |
      | EC Keys | {{ ec_certs | length }} | Modern elliptic curve keys |
      | SHA-256 Signatures | {{ sha256_certs | length }} | Current standard |
      | SHA-384 Signatures | {{ sha384_certs | length }} | Higher security |
      {% if sha1_certs | length > 0 %}| SHA-1 Signatures | {{ sha1_certs | length }} | **DEPRECATED - Replace immediately** |
      {% endif %}

      ## Recommendations

      Based on industry best practices, CA/Browser Forum requirements, and post-quantum cryptography (PQC) preparedness:

      ### Certificate Lifetime

      | Finding | Recommendation |
      |---------|----------------|
      {% set long_lived_certs = cert_report | selectattr('days_remaining', 'defined') | selectattr('days_remaining', 'gt', 90) | list %}
      {% if long_lived_certs | length > 0 %}| {{ long_lived_certs | length }} cert(s) have >90 day lifetime | **Consider shorter rotation.** Apple/Google propose 47-day max for public TLS certs (effective 2028). Shorter lifetimes reduce exposure window if keys are compromised. |
      {% endif %}{% set very_long_certs = cert_report | selectattr('days_remaining', 'defined') | selectattr('days_remaining', 'gt', 398) | list %}
      {% if very_long_certs | length > 0 %}| {{ very_long_certs | length }} cert(s) exceed 398-day CA/B limit | Current CA/Browser Forum maximum for public TLS is 398 days. While internal CAs aren't bound by this, aligning reduces operational risk. |
      {% endif %}{% if long_lived_certs | length == 0 %}| All certs within 90-day window | Excellent - aligned with short-lived certificate best practices. |
      {% endif %}

      ### Post-Quantum Cryptography (PQC) Preparedness

      | Current State | Recommendation |
      |---------------|----------------|
      {% if rsa_certs | length > 0 and ec_certs | length == 0 %}| All certificates use RSA | **Migrate to ECDSA (P-384) or Ed25519.** RSA is more vulnerable to quantum attacks. NIST recommends transitioning to quantum-resistant algorithms by 2030. EC provides equivalent security with smaller keys. |
      {% elif ec_certs | length > 0 and rsa_certs | length > 0 %}| Mixed RSA/EC environment | Good progress. Continue migrating remaining RSA certificates to ECDSA P-384 or Ed25519 for PQC resilience. |
      {% elif ec_certs | length > 0 and rsa_certs | length == 0 %}| All certificates use EC | Excellent - well positioned for post-quantum transition. |
      {% endif %}{% if weak_rsa | length > 0 %}| {{ weak_rsa | length }} RSA cert(s) use <3072-bit keys | **Upgrade to RSA-3072 minimum** if staying with RSA. NIST SP 800-57 recommends 3072-bit RSA for security through 2030+. |
      {% endif %}{% if sha1_certs | length > 0 %}| {{ sha1_certs | length }} cert(s) use SHA-1 | **Critical: Replace immediately.** SHA-1 is cryptographically broken and rejected by all major browsers. |
      {% endif %}

      ### Recommended Target Configuration

      | Component | Current Best Practice | PQC-Ready Target |
      |-----------|----------------------|------------------|
      | Key Algorithm | ECDSA P-384 or RSA-3072 | ML-DSA (Dilithium) hybrid certificates |
      | Signature | SHA-384 or SHA-512 | SHA-384 minimum |
      | Certificate Lifetime | 90 days (internal), 47 days (public) | Automated renewal via ACME/cert-manager |
      | Key Rotation | Annual | Continuous (short-lived certs) |

      ### Action Items

      {% if rsa_certs | length > 0 %}1. **Plan EC migration**: Evaluate ECDSA P-384 for component certificates to reduce key sizes and improve PQC resilience
      {% endif %}{% if long_lived_certs | length > 0 %}2. **Implement automated renewal**: Deploy cert-manager or ACME protocol for automated short-lived certificate rotation
      {% endif %}{% if weak_rsa | length > 0 %}3. **Upgrade RSA key sizes**: Increase RSA keys from 2048-bit to 3072-bit minimum for continued use
      {% endif %}4. **Monitor PQC standards**: Track NIST PQC standardization (ML-KEM, ML-DSA) for future hybrid certificate deployment
      5. **Document crypto inventory**: Maintain certificate crypto audit for compliance and transition planning

      ---
      *Report generated by check-aap-certs role (platform: {{ cert_summary.platform }})*
    dest: "{{ report_file }}"
    mode: '0644'
  when: report_file | length > 0

- name: Report file location
  ansible.builtin.debug:
    msg: "Report saved to: {{ report_file }}"
  when: report_file | length > 0

# Fail conditions
- name: Fail if certificates are expired
  ansible.builtin.fail:
    msg: "{{ cert_summary.expired }} certificate(s) have expired!"
  when:
    - fail_on_expired | bool
    - cert_summary.expired | int > 0

- name: Fail if certificates are expiring soon
  ansible.builtin.fail:
    msg: "{{ cert_summary.warning }} certificate(s) expire within {{ cert_warning_days }} days!"
  when:
    - fail_on_warning | bool
    - cert_summary.warning | int > 0
