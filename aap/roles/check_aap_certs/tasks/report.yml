---
# roles/check_aap_certs/tasks/report.yml
#
# Common report generation for all platforms

- name: Sort report by days remaining
  ansible.builtin.set_fact:
    cert_report_sorted: >-
      {{
        (cert_report | selectattr('status', 'in', ['missing', 'error', 'expired', 'warning']) | list) +
        (cert_report | selectattr('status', 'eq', 'ok') | sort(attribute='days_remaining') | list)
      }}

- name: Calculate summary statistics
  ansible.builtin.set_fact:
    cert_summary:
      total: "{{ cert_report | length }}"
      ok: "{{ cert_report | selectattr('status', 'eq', 'ok') | list | length }}"
      warning: "{{ cert_report | selectattr('status', 'eq', 'warning') | list | length }}"
      expired: "{{ cert_report | selectattr('status', 'eq', 'expired') | list | length }}"
      missing: "{{ cert_report | selectattr('status', 'eq', 'missing') | list | length }}"
      error: "{{ cert_report | selectattr('status', 'eq', 'error') | list | length }}"
      platform: "{{ cert_report[0].platform | default('unknown') }}"

# Display report header
- name: Display report header
  ansible.builtin.debug:
    msg: "═══════════════════════════════════════════════════════════════════════════════════════"

- name: Display report title
  ansible.builtin.debug:
    msg: "AAP Certificate Expiry Report"

- name: Display report separator
  ansible.builtin.debug:
    msg: "═══════════════════════════════════════════════════════════════════════════════════════"

- name: Display host info
  ansible.builtin.debug:
    msg: "Host: {{ inventory_hostname }}"

- name: Display platform info
  ansible.builtin.debug:
    msg: "Platform: {{ cert_summary.platform }}"

- name: Display check date
  ansible.builtin.debug:
    msg: "Check Date: {{ ansible_date_time.iso8601 }}"

- name: Display warning threshold
  ansible.builtin.debug:
    msg: "Warning Threshold: {{ warn_days }} days"

- name: Display header separator
  ansible.builtin.debug:
    msg: "───────────────────────────────────────────────────────────────────────────────────────"

# Display table header
- name: Display table header
  ansible.builtin.debug:
    msg: "{{ '%-22s' | format('CERTIFICATE') }} {{ '%-10s' | format('STATUS') }} {{ '%-10s' | format('SOURCE') }} {{ '%-12s' | format('EXPIRES') }} {{ '%6s' | format('DAYS') }}  PATH"

# Display each certificate
- name: Display certificate status
  ansible.builtin.debug:
    msg: "{{ '%-22s' | format(item.name[:22]) }} {{ '%-10s' | format('[' + item.status | upper + ']') }} {{ '%-10s' | format(item.source[:10]) }} {{ '%-12s' | format((item.expiry_date[:12]) if item.expiry_date != 'N/A' else 'N/A') }} {{ '%6s' | format(item.days_remaining | default('N/A') | string) }}  {{ item.path }}"
  loop: "{{ cert_report_sorted }}"
  loop_control:
    label: "{{ item.name }}"

# Display summary
- name: Display summary separator
  ansible.builtin.debug:
    msg: "───────────────────────────────────────────────────────────────────────────────────────"

- name: Display summary
  ansible.builtin.debug:
    msg: "SUMMARY: Total={{ cert_summary.total }} | OK={{ cert_summary.ok }} | Warning={{ cert_summary.warning }} | Expired={{ cert_summary.expired }} | Missing={{ cert_summary.missing }}{{ ' | Errors=' + cert_summary.error | string if cert_summary.error | int > 0 else '' }}"

- name: Display final separator
  ansible.builtin.debug:
    msg: "───────────────────────────────────────────────────────────────────────────────────────"

# Alerts
- name: Display CRITICAL alert
  ansible.builtin.debug:
    msg: "*** CRITICAL: {{ cert_summary.expired }} certificate(s) have EXPIRED! ***"
  when: cert_summary.expired | int > 0

- name: Display WARNING alert
  ansible.builtin.debug:
    msg: "*** WARNING: {{ cert_summary.warning }} certificate(s) expire within {{ warn_days }} days ***"
  when: cert_summary.warning | int > 0

- name: Display OK status
  ansible.builtin.debug:
    msg: "*** All certificates OK ***"
  when: cert_summary.expired | int == 0 and cert_summary.warning | int == 0 and cert_summary.missing | int == 0

# Generate markdown report file if requested
- name: Generate markdown report
  ansible.builtin.copy:
    content: |
      # AAP Certificate Expiry Report

      **Host:** {{ inventory_hostname }}
      **Platform:** {{ cert_summary.platform }}
      **Check Date:** {{ ansible_date_time.iso8601 }}
      **Warning Threshold:** {{ warn_days }} days

      ## Summary

      | Status | Count |
      |--------|-------|
      | OK | {{ cert_summary.ok }} |
      | Warning | {{ cert_summary.warning }} |
      | Expired | {{ cert_summary.expired }} |
      | Missing | {{ cert_summary.missing }} |
      {% if cert_summary.error | int > 0 %}| Errors | {{ cert_summary.error }} |
      {% endif %}| **Total** | **{{ cert_summary.total }}** |

      {% if cert_summary.expired | int > 0 %}
      > **CRITICAL:** {{ cert_summary.expired }} certificate(s) have **EXPIRED**!
      {% endif %}
      {% if cert_summary.warning | int > 0 %}
      > **WARNING:** {{ cert_summary.warning }} certificate(s) expire within {{ warn_days }} days
      {% endif %}

      ## Certificate Details

      | Certificate | Status | Source | Expires | Days Left | Path |
      |-------------|--------|--------|---------|-----------|------|
      {% for cert in cert_report_sorted %}
      | {{ cert.name }} | {% if cert.status == 'expired' %}**EXPIRED**{% elif cert.status == 'warning' %}**WARNING**{% elif cert.status == 'missing' %}MISSING{% elif cert.status == 'error' %}ERROR{% else %}OK{% endif %} | {{ cert.source }} | {{ cert.expiry_date }} | {{ cert.days_remaining | default('N/A') }} | `{{ cert.path }}` |
      {% endfor %}

      ## Certificates Requiring Attention

      {% if cert_report | selectattr('status', 'in', ['expired', 'warning']) | list | length > 0 %}
      {% for cert in cert_report_sorted if cert.status in ['expired', 'warning'] %}
      ### {{ cert.name }} ({{ cert.status | upper }})

      - **Path:** `{{ cert.path }}`
      - **Source:** {{ cert.source }}
      - **Expires:** {{ cert.expiry_date }}
      - **Days Remaining:** {{ cert.days_remaining }}
      - **Platform:** {{ cert.platform }}
      {% if cert.platform == 'containerized' %}
      - **Action Required:** {% if cert.source == 'Installer' %}Regenerate using AAP installer or rotate-installer-certs.yml{% elif cert.source == 'Custom CA' %}Regenerate using your CA{% elif cert.source == 'External' %}Obtain new certificate from external CA/ACME provider{% else %}Check certificate configuration{% endif %}
      {% else %}
      - **Action Required:** {% if cert.source == 'cert-manager' %}Check cert-manager Certificate resource for renewal status{% else %}Update Kubernetes Secret with new certificate{% endif %}
      {% endif %}

      {% endfor %}
      {% else %}
      No certificates require immediate attention.
      {% endif %}

      ---
      *Report generated by check-aap-certs role (platform: {{ cert_summary.platform }})*
    dest: "{{ report_file }}"
    mode: '0644'
  when: report_file | length > 0

- name: Report file location
  ansible.builtin.debug:
    msg: "Report saved to: {{ report_file }}"
  when: report_file | length > 0

# Fail conditions
- name: Fail if certificates are expired
  ansible.builtin.fail:
    msg: "{{ cert_summary.expired }} certificate(s) have expired!"
  when:
    - fail_on_expired | bool
    - cert_summary.expired | int > 0

- name: Fail if certificates are expiring soon
  ansible.builtin.fail:
    msg: "{{ cert_summary.warning }} certificate(s) expire within {{ warn_days }} days!"
  when:
    - fail_on_warning | bool
    - cert_summary.warning | int > 0
