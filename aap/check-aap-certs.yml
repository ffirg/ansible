---
# playbooks/check-aap-certs-v2.yml
#
# Check AAP certificate expiry across all platform types
# Supports: containerized (podman), openshift, kubernetes
#
# Usage:
#   # Auto-detect platform
#   ansible-playbook check-aap-certs-v2.yml
#
#   # Specify platform explicitly
#   ansible-playbook check-aap-certs-v2.yml -e "aap_platform=containerized"
#   ansible-playbook check-aap-certs-v2.yml -e "aap_platform=openshift"
#   ansible-playbook check-aap-certs-v2.yml -e "aap_platform=kubernetes"
#
#   # Custom warning threshold
#   ansible-playbook check-aap-certs-v2.yml -e "warn_days=30"
#
#   # Generate report file
#   ansible-playbook check-aap-certs-v2.yml -e "report_file=/tmp/cert-report.md"
#
#   # OpenShift/Kubernetes: specify namespace
#   ansible-playbook check-aap-certs-v2.yml -e "aap_platform=openshift" -e "aap_namespace=ansible-automation-platform"
#
# Variables:
#   aap_platform: Platform type - 'auto', 'containerized', 'openshift', 'kubernetes' (default: auto)
#   warn_days: Warning threshold in days (default: 14)
#   report_file: Path to save markdown report (optional)
#   fail_on_warning: Fail if certs expire within warning period (default: false)
#   fail_on_expired: Fail if certs are expired (default: true)
#   aap_namespace: Kubernetes/OpenShift namespace (default: aap)
#   aap_base: Base path for containerized AAP (default: ~/aap)
#
# Features:
#   - Auto-detects platform based on available tools and running services
#   - Dynamically discovers containers/pods (no hardcoded list)
#   - Supports all AAP deployment types
#   - Generates structured reports

- name: Check AAP Certificate Expiry (Multi-Platform)
  hosts: all
  gather_facts: true
  become: false

  roles:
    - role: check_aap_certs
      # Variables are set in roles/check_aap_certs/defaults/main.yml
      # Override via command line: -e "aap_platform=openshift" -e "warn_days=30"
