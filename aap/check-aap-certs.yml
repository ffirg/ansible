---
# playbooks/check-aap-certs.yml
#
# Discover and report AAP certificate expiry status
#
# Usage:
#   ansible-playbook check-aap-certs.yml
#   ansible-playbook check-aap-certs.yml -e "high_water_mark=14 critical_water_mark=7"
#
# Thresholds (days):
#   high_water_mark: Warning threshold (default: 10)
#   critical_water_mark: Critical threshold (default: 5)
#
# Status levels:
#   expired: Certificate has expired (days < 0)
#   critical: Days remaining <= critical_water_mark
#   warning: Days remaining <= high_water_mark
#   ok: Certificate is valid

- name: Discover AAP Certificate Status
  hosts: all
  gather_facts: true
  become: false

  vars:
    # Threshold defaults (in days)
    high_water_mark: 10        # Warning level
    critical_water_mark: 5     # Critical level

    # Output control
    show_human_report: true    # Set to false to hide formatted table output

    # AAP installation base path
    aap_base: "{{ ansible_env.HOME }}/aap"

    # Certificate definitions - AAP 2.6 containerized deployment paths
    certificates:
      - name: "Gateway"
        path: "{{ aap_base }}/gateway/etc/gateway.cert"

      - name: "Controller"
        path: "{{ aap_base }}/controller/etc/tower.cert"

      - name: "Hub"
        path: "{{ aap_base }}/hub/etc/pulp.cert"

      - name: "EDA"
        path: "{{ aap_base }}/eda/etc/eda.cert"

      - name: "Automation Dashboard"
        path: "{{ aap_base }}/reporter/etc/reporter.cert"

      - name: "AnsibleMCP"
        path: "{{ aap_base }}/ansiblemcp/etc/ansiblemcp.cert"

      - name: "CA Certificate"
        path: "{{ aap_base }}/tls/ca.cert"

      - name: "PostgreSQL"
        path: "{{ aap_base }}/postgresql/server.crt"

      - name: "Redis"
        path: "{{ aap_base }}/redis/server.crt"

      - name: "Receptor"
        path: "{{ aap_base }}/receptor/etc/receptor.crt"

      - name: "Receptor Mesh CA"
        path: "{{ aap_base }}/receptor/etc/mesh-CA.crt"

      - name: "Gateway Redis Client"
        path: "{{ aap_base }}/gateway/etc/redis.cert"

  tasks:
    - name: Check if certificate files exist
      ansible.builtin.stat:
        path: "{{ item.path }}"
      loop: "{{ certificates }}"
      loop_control:
        label: "{{ item.name }}"
      register: cert_files

    - name: Get certificate expiry dates
      ansible.builtin.shell: |
        openssl x509 -in "{{ item.item.path }}" -noout -enddate 2>/dev/null | \
          sed 's/notAfter=//'
      loop: "{{ cert_files.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.stat.exists
      register: cert_expiry
      changed_when: false
      failed_when: false

    - name: Calculate days remaining for each certificate
      ansible.builtin.shell: |
        expiry_date=$(openssl x509 -in "{{ item.item.path }}" -noout -enddate 2>/dev/null | sed 's/notAfter=//')
        expiry_epoch=$(date -d "$expiry_date" +%s 2>/dev/null || date -jf "%b %d %T %Y %Z" "$expiry_date" +%s 2>/dev/null)
        now_epoch=$(date +%s)
        echo $(( (expiry_epoch - now_epoch) / 86400 ))
      loop: "{{ cert_files.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.stat.exists
      register: days_remaining
      changed_when: false
      failed_when: false

    - name: Get certificate CN
      ansible.builtin.shell: |
        openssl x509 -in "{{ item.item.path }}" -noout -subject 2>/dev/null | \
          sed 's/.*CN *= *//' | cut -d',' -f1 | cut -d'/' -f1
      loop: "{{ cert_files.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.stat.exists
      register: cert_cn
      changed_when: false
      failed_when: false

    - name: Get local CA subject (for source detection)
      ansible.builtin.shell: |
        openssl x509 -in "{{ aap_base }}/tls/ca.cert" -noout -subject 2>/dev/null | \
          sed 's/subject=//'
      register: ca_subject
      changed_when: false
      failed_when: false

    - name: Detect if CA is installer-generated or custom
      ansible.builtin.set_fact:
        ca_is_installer: "{{ 'Red Hat' in ca_subject.stdout or 'Ansible' in ca_subject.stdout }}"

    - name: Get certificate issuer
      ansible.builtin.shell: |
        openssl x509 -in "{{ item.item.path }}" -noout -issuer 2>/dev/null | \
          sed 's/issuer=//'
      loop: "{{ cert_files.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.stat.exists
      register: cert_issuer
      changed_when: false
      failed_when: false

    - name: Build certificate report data
      ansible.builtin.set_fact:
        cert_report: >-
          {{
            cert_report | default([]) + [{
              'name': item.0.item.name,
              'path': item.0.item.path,
              'exists': item.0.stat.exists,
              'days_remaining': (item.1.stdout | int) if item.0.stat.exists else none,
              'expiry_date': item.2.stdout if item.0.stat.exists else 'N/A',
              'cn': item.3.stdout if item.0.stat.exists else 'N/A',
              'issuer': item.4.stdout | default('N/A') if item.0.stat.exists else 'N/A',
              'source':
                'N/A' if not item.0.stat.exists else
                'Installer CA' if item.0.item.name == 'CA Certificate' and ca_is_installer else
                'Custom CA' if item.0.item.name == 'CA Certificate' and not ca_is_installer else
                'Installer' if (item.4.stdout | default('')) == (ca_subject.stdout | default('NO_MATCH')) and ca_is_installer else
                'Custom CA' if (item.4.stdout | default('')) == (ca_subject.stdout | default('NO_MATCH')) and not ca_is_installer else
                'External',
              'status':
                'missing' if not item.0.stat.exists else
                'expired' if (item.1.stdout | int) < 0 else
                'critical' if (item.1.stdout | int) <= critical_water_mark else
                'warning' if (item.1.stdout | int) <= high_water_mark else
                'ok'
            }]
          }}
      loop: "{{ cert_files.results | zip(days_remaining.results, cert_expiry.results, cert_cn.results, cert_issuer.results) | list }}"
      loop_control:
        label: "{{ item.0.item.name }}"

    - name: Sort report by days remaining (most urgent first)
      ansible.builtin.set_fact:
        cert_report_sorted: >-
          {{
            (cert_report | selectattr('status', 'in', ['missing', 'expired', 'critical', 'warning']) | sort(attribute='days_remaining') | list) +
            (cert_report | selectattr('status', 'eq', 'ok') | sort(attribute='days_remaining') | list)
          }}

    - name: Calculate summary statistics
      ansible.builtin.set_fact:
        cert_summary:
          total: "{{ cert_report | length }}"
          ok: "{{ cert_report | selectattr('status', 'eq', 'ok') | list | length }}"
          warning: "{{ cert_report | selectattr('status', 'eq', 'warning') | list | length }}"
          critical: "{{ cert_report | selectattr('status', 'eq', 'critical') | list | length }}"
          expired: "{{ cert_report | selectattr('status', 'eq', 'expired') | list | length }}"
          missing: "{{ cert_report | selectattr('status', 'eq', 'missing') | list | length }}"

    - name: Build action required lists
      ansible.builtin.set_fact:
        certs_expired: "{{ cert_report | selectattr('status', 'eq', 'expired') | list }}"
        certs_critical: "{{ cert_report | selectattr('status', 'eq', 'critical') | list }}"
        certs_warning: "{{ cert_report | selectattr('status', 'eq', 'warning') | list }}"

    - name: Display formatted report
      when: show_human_report | default(true) | bool
      ansible.builtin.debug:
        msg: |

          ╔═══════════════════════════════════════════════════════════════════════════════════════╗
          ║                           AAP Certificate Discovery Report                            ║
          ╠═══════════════════════════════════════════════════════════════════════════════════════╣
          ║ Host: {{ '%-75s' | format(inventory_hostname) }} ║
          ║ Check Date: {{ '%-69s' | format(ansible_date_time.iso8601) }} ║
          ║ Thresholds: Warning={{ high_water_mark }} days | Critical={{ critical_water_mark }} days{{ ' ' * (56 - (high_water_mark | string | length) - (critical_water_mark | string | length)) }}║
          ╚═══════════════════════════════════════════════════════════════════════════════════════╝

          ┌─────────────────────────────────────────────────────────────────────────────────────────┐
          │ SUMMARY                                                                                 │
          ├─────────┬─────────┬─────────┬──────────┬─────────┬─────────┬─────────────────────────────┤
          │  Total  │   OK    │ Warning │ Critical │ Expired │ Missing │                             │
          ├─────────┼─────────┼─────────┼──────────┼─────────┼─────────┼─────────────────────────────┤
          │ {{ '%7s' | format(cert_summary.total) }} │ {{ '%7s' | format(cert_summary.ok) }} │ {{ '%7s' | format(cert_summary.warning) }} │ {{ '%8s' | format(cert_summary.critical) }} │ {{ '%7s' | format(cert_summary.expired) }} │ {{ '%7s' | format(cert_summary.missing) }} │                             │
          └─────────┴─────────┴─────────┴──────────┴─────────┴─────────┴─────────────────────────────┘

          ┌──────────────────────────┬───────────┬───────────┬────────────┬─────────────────────────────┐
          │ Certificate              │ Days Left │  Status   │   Source   │ Expiry Date                 │
          ├──────────────────────────┼───────────┼───────────┼────────────┼─────────────────────────────┤
          {% for cert in cert_report_sorted %}
          │ {{ '%-24s' | format(cert.name) }} │ {{ '%9s' | format(cert.days_remaining | default('N/A')) }} │ {{ '%-9s' | format(cert.status | upper) }} │ {{ '%-10s' | format(cert.source) }} │ {{ '%-27s' | format(cert.expiry_date[:27] if cert.expiry_date != 'N/A' else 'N/A') }} │
          {% endfor %}
          └──────────────────────────┴───────────┴───────────┴────────────┴─────────────────────────────┘
          {% if certs_expired | length > 0 %}

          🚨 EXPIRED CERTIFICATES - IMMEDIATE ACTION REQUIRED:
          {% for cert in certs_expired %}
             • {{ cert.name }}: Expired {{ cert.days_remaining | abs }} days ago - Source: {{ cert.source }}
          {% endfor %}
          {% endif %}
          {% if certs_critical | length > 0 %}

          ⚠️  CRITICAL - Expiring within {{ critical_water_mark }} days:
          {% for cert in certs_critical %}
             • {{ cert.name }}: {{ cert.days_remaining }} days remaining - Source: {{ cert.source }}
          {% endfor %}
          {% endif %}
          {% if certs_warning | length > 0 %}

          ⏰ WARNING - Expiring within {{ high_water_mark }} days:
          {% for cert in certs_warning %}
             • {{ cert.name }}: {{ cert.days_remaining }} days remaining - Source: {{ cert.source }}
          {% endfor %}
          {% endif %}
          {% if certs_expired | length == 0 and certs_critical | length == 0 and certs_warning | length == 0 %}

          ✅ All certificates are healthy - no action required
          {% endif %}

    # JSON output for portal/API consumption
    - name: Output JSON report for portal
      ansible.builtin.debug:
        msg: >-
          CERT_REPORT_JSON:{{ {
            'host': inventory_hostname,
            'checkDate': ansible_date_time.iso8601,
            'thresholds': {
              'highWaterMark': high_water_mark,
              'criticalWaterMark': critical_water_mark
            },
            'summary': cert_summary,
            'certificates': cert_report_sorted,
            'actionRequired': {
              'expired': certs_expired,
              'critical': certs_critical,
              'warning': certs_warning
            }
          } | to_json }}
