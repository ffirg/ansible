---
# playbooks/check-aap-certs.yml
#
# Discover and report AAP certificate expiry status using the check_aap_certs role
#
# Usage:
#   ansible-playbook check-aap-certs.yml
#   ansible-playbook check-aap-certs.yml -e "high_water_mark=14 critical_water_mark=7"
#   ansible-playbook check-aap-certs.yml -e "aap_platform=openshift aap_namespace=aap"
#
# Thresholds (days):
#   high_water_mark: Warning threshold (default: 47)
#   critical_water_mark: Critical threshold (default: 5)
#
# Platform detection:
#   aap_platform: auto (default) | containerized | openshift | kubernetes
#
# Status levels:
#   expired: Certificate has expired (days < 0)
#   critical: Days remaining <= critical_water_mark
#   warning: Days remaining <= high_water_mark
#   ok: Certificate is valid

- name: Discover AAP Certificate Status
  hosts: all
  gather_facts: true
  become: false

  vars:
    # Threshold defaults (in days)
    high_water_mark: 47        # Warning level
    critical_water_mark: 5     # Critical level

    # Output control
    show_human_report: true    # Set to false to hide formatted table output

    # Platform detection - auto, containerized, openshift, kubernetes
    aap_platform: auto

  tasks:
    # Run the role to discover and check certificates
    - name: Run certificate discovery role
      ansible.builtin.include_role:
        name: check_aap_certs
      vars:
        warn_days: "{{ high_water_mark }}"
        fail_on_expired: false
        fail_on_warning: false

    # Post-process role output to add critical status (role only has ok/warning/expired)
    - name: Update certificate status with critical threshold
      ansible.builtin.set_fact:
        cert_report_updated: []

    - name: Recalculate status for each certificate
      ansible.builtin.set_fact:
        cert_report_updated: >-
          {{ cert_report_updated + [
            item | combine({
              'status':
                'missing' if not item.exists | default(true) else
                'error' if item.status | default('') == 'error' else
                'expired' if (item.days_remaining | default(999) | int) < 0 else
                'critical' if (item.days_remaining | default(999) | int) <= (critical_water_mark | int) else
                'warning' if (item.days_remaining | default(999) | int) <= (high_water_mark | int) else
                'ok'
            })
          ] }}
      loop: "{{ cert_report | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when: cert_report is defined

    - name: Replace cert_report with updated statuses
      ansible.builtin.set_fact:
        cert_report: "{{ cert_report_updated }}"
      when: cert_report_updated | length > 0

    - name: Sort report by days remaining (most urgent first)
      ansible.builtin.set_fact:
        cert_report_sorted: >-
          {{
            (cert_report | default([]) | selectattr('status', 'in', ['missing', 'error', 'expired', 'critical', 'warning']) | sort(attribute='days_remaining') | list) +
            (cert_report | default([]) | selectattr('status', 'eq', 'ok') | sort(attribute='days_remaining') | list)
          }}
      when: cert_report is defined

    - name: Calculate summary statistics
      ansible.builtin.set_fact:
        cert_summary:
          total: "{{ cert_report | default([]) | length }}"
          ok: "{{ cert_report | default([]) | selectattr('status', 'eq', 'ok') | list | length }}"
          warning: "{{ cert_report | default([]) | selectattr('status', 'eq', 'warning') | list | length }}"
          critical: "{{ cert_report | default([]) | selectattr('status', 'eq', 'critical') | list | length }}"
          expired: "{{ cert_report | default([]) | selectattr('status', 'eq', 'expired') | list | length }}"
          missing: "{{ cert_report | default([]) | selectattr('status', 'eq', 'missing') | list | length }}"
          platform: "{{ aap_platform }}"
      when: cert_report is defined

    - name: Build action required lists
      ansible.builtin.set_fact:
        certs_expired: "{{ cert_report | default([]) | selectattr('status', 'eq', 'expired') | list }}"
        certs_critical: "{{ cert_report | default([]) | selectattr('status', 'eq', 'critical') | list }}"
        certs_warning: "{{ cert_report | default([]) | selectattr('status', 'eq', 'warning') | list }}"
      when: cert_report is defined

    - name: Display formatted report
      when:
        - show_human_report | default(true) | bool
        - cert_report is defined
        - cert_report | length > 0
      ansible.builtin.debug:
        msg: |

          ╔═══════════════════════════════════════════════════════════════════════════════════════╗
          ║                           AAP Certificate Discovery Report                            ║
          ╠═══════════════════════════════════════════════════════════════════════════════════════╣
          ║ Host: {{ '%-75s' | format(inventory_hostname) }} ║
          ║ Platform: {{ '%-71s' | format(aap_platform) }} ║
          ║ Check Date: {{ '%-69s' | format(ansible_date_time.iso8601) }} ║
          ║ Thresholds: Warning={{ high_water_mark }} days | Critical={{ critical_water_mark }} days{{ ' ' * (56 - (high_water_mark | string | length) - (critical_water_mark | string | length)) }}║
          ╚═══════════════════════════════════════════════════════════════════════════════════════╝

          ┌─────────────────────────────────────────────────────────────────────────────────────────┐
          │ SUMMARY                                                                                 │
          ├─────────┬─────────┬─────────┬──────────┬─────────┬─────────┬─────────────────────────────┤
          │  Total  │   OK    │ Warning │ Critical │ Expired │ Missing │                             │
          ├─────────┼─────────┼─────────┼──────────┼─────────┼─────────┼─────────────────────────────┤
          │ {{ '%7s' | format(cert_summary.total) }} │ {{ '%7s' | format(cert_summary.ok) }} │ {{ '%7s' | format(cert_summary.warning) }} │ {{ '%8s' | format(cert_summary.critical) }} │ {{ '%7s' | format(cert_summary.expired) }} │ {{ '%7s' | format(cert_summary.missing) }} │                             │
          └─────────┴─────────┴─────────┴──────────┴─────────┴─────────┴─────────────────────────────┘

          ┌──────────────────────────┬───────────┬───────────┬────────────┬─────────────────────────────┐
          │ Certificate              │ Days Left │  Status   │   Source   │ Expiry Date                 │
          ├──────────────────────────┼───────────┼───────────┼────────────┼─────────────────────────────┤
          {% for cert in cert_report_sorted %}
          │ {{ '%-24s' | format(cert.name) }} │ {{ '%9s' | format(cert.days_remaining | default('N/A')) }} │ {{ '%-9s' | format(cert.status | upper) }} │ {{ '%-10s' | format(cert.source) }} │ {{ '%-27s' | format(cert.expiry_date[:27] if cert.expiry_date != 'N/A' else 'N/A') }} │
          {% endfor %}
          └──────────────────────────┴───────────┴───────────┴────────────┴─────────────────────────────┘
          {% if certs_expired | length > 0 %}

          🚨 EXPIRED CERTIFICATES - IMMEDIATE ACTION REQUIRED:
          {% for cert in certs_expired %}
             • {{ cert.name }}: Expired {{ cert.days_remaining | abs }} days ago - Source: {{ cert.source }}
          {% endfor %}
          {% endif %}
          {% if certs_critical | length > 0 %}

          ⚠️  CRITICAL - Expiring within {{ critical_water_mark }} days:
          {% for cert in certs_critical %}
             • {{ cert.name }}: {{ cert.days_remaining }} days remaining - Source: {{ cert.source }}
          {% endfor %}
          {% endif %}
          {% if certs_warning | length > 0 %}

          ⏰ WARNING - Expiring within {{ high_water_mark }} days:
          {% for cert in certs_warning %}
             • {{ cert.name }}: {{ cert.days_remaining }} days remaining - Source: {{ cert.source }}
          {% endfor %}
          {% endif %}
          {% if certs_expired | length == 0 and certs_critical | length == 0 and certs_warning | length == 0 %}

          ✅ All certificates are healthy - no action required
          {% endif %}

    # JSON output for portal/API consumption
    - name: Output JSON report for portal
      when: cert_report is defined
      ansible.builtin.debug:
        msg: >-
          CERT_REPORT_JSON:{{ {
            'host': inventory_hostname,
            'platform': aap_platform,
            'checkDate': ansible_date_time.iso8601,
            'thresholds': {
              'highWaterMark': high_water_mark,
              'criticalWaterMark': critical_water_mark
            },
            'summary': cert_summary,
            'certificates': cert_report_sorted,
            'actionRequired': {
              'expired': certs_expired,
              'critical': certs_critical,
              'warning': certs_warning
            }
          } | to_json }}
