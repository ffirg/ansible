---
# playbooks/rotate-aap-certs.yml
#
# Rotate AAP certificates without full installer reinstall
# Supports both installer-generated (internal CA) and BYO certificates
#
# Usage:
#   # Rotate specific component cert (regenerate with internal CA)
#   ansible-playbook rotate-aap-certs.yml -e "components=['gateway']"
#
#   # Rotate multiple components
#   ansible-playbook rotate-aap-certs.yml -e "components=['gateway','controller','hub','eda']"
#
#   # Rotate ALL component certs (not CA)
#   ansible-playbook rotate-aap-certs.yml -e "rotate_all=true"
#
#   # Rotate with new BYO cert (external CA)
#   ansible-playbook rotate-aap-certs.yml -e "components=['gateway']" \
#     -e "byo_cert=/path/to/new.cert" -e "byo_key=/path/to/new.key"
#
#   # Extend validity period (default 365 days)
#   ansible-playbook rotate-aap-certs.yml -e "components=['gateway']" -e "validity_days=730"
#
# Variables:
#   components: List of components to rotate (gateway, controller, hub, eda, receptor, redis, postgresql)
#   rotate_all: Rotate all component certs (default: false)
#   validity_days: Certificate validity in days (default: 365)
#   byo_cert: Path to BYO certificate file (optional)
#   byo_key: Path to BYO private key file (optional)
#   backup: Create backup of old certs (default: true)

- name: Rotate AAP Certificates
  hosts: all
  gather_facts: true
  become: false

  vars:
    aap_base: "{{ ansible_env.HOME }}/aap"
    validity_days: 365
    backup: true
    rotate_all: false
    components: []
    byo_cert: ""
    byo_key: ""

    # Certificate definitions matching installer paths
    cert_definitions:
      gateway:
        cert_path: "{{ aap_base }}/gateway/etc/gateway.cert"
        key_path: "{{ aap_base }}/gateway/etc/gateway.key"
        container: automation-gateway
        cn: "{{ inventory_hostname }}"

      controller:
        cert_path: "{{ aap_base }}/controller/etc/tower.cert"
        key_path: "{{ aap_base }}/controller/etc/tower.key"
        container: automation-controller-web
        cn: "{{ inventory_hostname }}"

      hub:
        cert_path: "{{ aap_base }}/hub/etc/pulp.cert"
        key_path: "{{ aap_base }}/hub/etc/pulp.key"
        container: automation-hub-web
        cn: "{{ inventory_hostname }}"

      eda:
        cert_path: "{{ aap_base }}/eda/etc/eda.cert"
        key_path: "{{ aap_base }}/eda/etc/eda.key"
        container: automation-eda-web
        cn: "{{ inventory_hostname }}"

      receptor:
        cert_path: "{{ aap_base }}/receptor/etc/receptor.crt"
        key_path: "{{ aap_base }}/receptor/etc/receptor.key"
        container: receptor
        cn: "{{ inventory_hostname }}"

      redis:
        cert_path: "{{ aap_base }}/redis/server.crt"
        key_path: "{{ aap_base }}/redis/server.key"
        container: redis
        cn: "{{ inventory_hostname }}"

      postgresql:
        cert_path: "{{ aap_base }}/postgresql/server.crt"
        key_path: "{{ aap_base }}/postgresql/server.key"
        container: postgresql
        cn: "{{ inventory_hostname }}"

    # Subject DN matching installer defaults
    cert_subject:
      country_name: "US"
      state_or_province_name: "North Carolina"
      locality_name: "Raleigh"
      organization_name: "Red Hat"
      organizational_unit_name: "Ansible"

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - rotate_all | bool or components | length > 0
          - (byo_cert | length == 0 and byo_key | length == 0) or (byo_cert | length > 0 and byo_key | length > 0)
        fail_msg: "Must specify components=[] or rotate_all=true. BYO cert and key must both be provided or neither."

    - name: Build component list
      ansible.builtin.set_fact:
        target_components: "{{ cert_definitions.keys() | list if rotate_all else components }}"

    - name: Display rotation plan
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════════════════════"
          - "AAP Certificate Rotation"
          - "═══════════════════════════════════════════════════════════════════"
          - "Host: {{ inventory_hostname }}"
          - "Components: {{ target_components | join(', ') }}"
          - "Mode: {{ 'BYO Certificate' if byo_cert else 'Regenerate with Internal CA' }}"
          - "Validity: {{ validity_days }} days"
          - "═══════════════════════════════════════════════════════════════════"

    - name: Check CA certificate exists
      ansible.builtin.stat:
        path: "{{ aap_base }}/tls/ca.cert"
      register: ca_cert_stat
      when: byo_cert | length == 0

    - name: Fail if CA not found and not using BYO
      ansible.builtin.fail:
        msg: "CA certificate not found at {{ aap_base }}/tls/ca.cert. Cannot regenerate certs."
      when:
        - byo_cert | length == 0
        - not ca_cert_stat.stat.exists

    - name: Create backup directory
      ansible.builtin.file:
        path: "{{ aap_base }}/cert-backups/{{ ansible_date_time.date }}"
        state: directory
        mode: '0700'
      when: backup | bool

    - name: Process each component
      ansible.builtin.include_tasks: rotate-component-cert.yml
      loop: "{{ target_components }}"
      loop_control:
        loop_var: component_name

    - name: Display completion summary
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════════════════════"
          - "Certificate Rotation Complete"
          - "═══════════════════════════════════════════════════════════════════"
          - "Components rotated: {{ target_components | join(', ') }}"
          - "Backups: {{ aap_base }}/cert-backups/{{ ansible_date_time.date }}/"
          - "═══════════════════════════════════════════════════════════════════"
